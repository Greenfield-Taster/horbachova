name: Test Deploy - Check Files

on:
  workflow_dispatch: # Ручной запуск

jobs:
  test-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Create test file
      run: |
        echo "<h1>TEST - Site is working!</h1><p>Time: $(date)</p>" > test.html
        
    - name: Upload test file
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: tzk302.nic.ua
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        protocol: ftp
        local-dir: ./
        server-dir: /public_html/
        include: ["test.html"]
        
    - name: Check server contents via FTP
      env:
        FTP_SERVER: tzk302.nic.ua
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        sudo apt-get update
        sudo apt-get install -y lftp
        
        lftp -c "
        set ssl:verify-certificate false;
        open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
        cd /public_html/;
        echo '=== Files in public_html ===';
        ls -la;
        echo '=== Content of index.html (first 500 chars) ===';
        get index.html /dev/stdout | head -c 500;
        quit;
        "
