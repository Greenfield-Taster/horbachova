name: Clean Server - Remove Default Files

on:
  workflow_dispatch: # Ручной запуск

jobs:
  clean-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Check what files are on server and clean defaults
      env:
        FTP_SERVER: tzk302.nic.ua
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        sudo apt-get update
        sudo apt-get install -y lftp
        
        echo "=== Checking current server contents ==="
        
        lftp -c "
        set ssl:verify-certificate false;
        open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
        cd /public_html/;
        
        echo '=== Current files in public_html ===';
        ls -la;
        
        echo '=== Removing common default files ===';
        rm -f index.php 2>/dev/null && echo 'Removed index.php' || echo 'No index.php found';
        rm -f default.html 2>/dev/null && echo 'Removed default.html' || echo 'No default.html found';
        rm -f default.htm 2>/dev/null && echo 'Removed default.htm' || echo 'No default.htm found';
        rm -f welcome.html 2>/dev/null && echo 'Removed welcome.html' || echo 'No welcome.html found';
        rm -f home.html 2>/dev/null && echo 'Removed home.html' || echo 'No home.html found';
        rm -f placeholder.html 2>/dev/null && echo 'Removed placeholder.html' || echo 'No placeholder.html found';
        rm -f coming-soon.html 2>/dev/null && echo 'Removed coming-soon.html' || echo 'No coming-soon.html found';
        
        echo '=== Files after cleanup ===';
        ls -la;
        
        quit;
        "
        
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build
      run: npm run build
      
    - name: Force deploy all files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: tzk302.nic.ua
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        protocol: ftp
        local-dir: ./dist/
        server-dir: /public_html/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/.DS_Store
          **/Thumbs.db
        timeout: 300000
        security: loose
        log-level: verbose
        # Принудительная загрузка всех файлов
        dangerous-clean-slate: true
