name: Create Domain Test File

on:
  workflow_dispatch: # Ручной запуск

jobs:
  domain-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Create domain test files
      run: |
        echo "<!DOCTYPE html><html><head><title>DOMAIN TEST</title></head><body style='font-family: Arial; text-align: center; padding: 50px;'>" > domain-test.html
        echo "<h1 style='color: green;'>✅ DOMAIN WORKING!</h1>" >> domain-test.html
        echo "<h2>horbachova.com</h2>" >> domain-test.html
        echo "<p>Time: $(date)</p>" >> domain-test.html
        echo "<p style='color: blue;'>If you see this - domain is configured correctly!</p>" >> domain-test.html
        echo "</body></html>" >> domain-test.html
        
        # Создаем файл напрямую как index.html
        cp domain-test.html index.html
        
    - name: Upload test files to multiple locations
      env:
        FTP_SERVER: tzk302.nic.ua
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        sudo apt-get update
        sudo apt-get install -y lftp
        
        lftp -c "
        set ssl:verify-certificate false;
        open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
        
        echo '=== Uploading to /public_html/ ===';
        cd /public_html/ 2>/dev/null && put domain-test.html && put index.html && echo 'Uploaded to /public_html/';
        
        echo '=== Trying to upload to root / ===';
        cd / && put domain-test.html domain-test-root.html 2>/dev/null && echo 'Uploaded to root';
        
        echo '=== Current /public_html/ contents ===';
        cd /public_html/ && ls -la;
        
        quit;
        "
