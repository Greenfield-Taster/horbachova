name: Deploy to HIC.UA

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build
      run: npm run build
      
    - name: Clean default hosting files
      env:
        FTP_SERVER: tzk302.nic.ua
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        sudo apt-get update
        sudo apt-get install -y lftp
        
        echo "=== Cleaning default hosting files ==="
        
        lftp -c "
        set ssl:verify-certificate false;
        open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
        cd /public_html/;
        
        echo 'Current files:';
        ls -la;
        
        echo 'Removing potential default files...';
        rm -f index.php 2>/dev/null || true;
        rm -f default.html 2>/dev/null || true;
        rm -f default.htm 2>/dev/null || true;
        rm -f welcome.html 2>/dev/null || true;
        rm -f home.html 2>/dev/null || true;
        rm -f placeholder.html 2>/dev/null || true;
        rm -f coming-soon.html 2>/dev/null || true;
        rm -f park.html 2>/dev/null || true;
        
        echo 'Files after cleanup:';
        ls -la;
        
        quit;
        "
      
    - name: Deploy to HIC.UA via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: tzk302.nic.ua
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        port: 21
        protocol: ftp
        local-dir: ./dist/
        server-dir: /public_html/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/.DS_Store
          **/Thumbs.db
        timeout: 300000
        security: loose
        log-level: verbose
