name: Deploy to HIC.UA (Alternative LFTP)

on:
  workflow_dispatch: # Ручной запуск
  
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
      
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build
      run: npm run build
      
    - name: Deploy via LFTP to tzk302.nic.ua
      env:
        FTP_SERVER: tzk302.nic.ua
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      run: |
        sudo apt-get update
        sudo apt-get install -y lftp
        
        lftp -c "
        set ssl:verify-certificate false;
        set ftp:passive-mode true;
        set net:timeout 60;
        set net:max-retries 3;
        open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
        lcd ./dist;
        cd /domains/horbachova.com/public_html/;
        mirror --reverse --delete --verbose --exclude-glob .git* --exclude-glob node_modules/ ./;
        quit;
        "
